<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/utils.css">
    <link rel="stylesheet" href="css/mobile.css">
    <link rel="stylesheet" href="css/associate.css">
    <title>Associate Login</title>
</head>
<body>
    <nav class="navbar background sticky bg-img">
        <div class="left-nav">
            <ul class="left-tab">
                <li class="list-item"><a href="index.html">Home</a></li>
                <li class="list-item"><a href="about.html">About</a></li>
                <li class="list-item"><a href="contact.html">Contact</a></li>
            </ul>
            <div class="logo">
                <img src="img/logo-dark.png" alt="Logo">
            </div>
        </div>
        <div class="right-nav">
            <ul class="right-tab">
                <li class="list-item"><a href="associate.html">Associate Login</a></li>
            </ul>
        </div>
    </nav>

    <section class="associate-login-main">
        <div class="associate-box">
            <div class="as-logo">
                <img src="img/logo-dark.png" alt="">
            </div>
            <div class="as-title">
                <h3 class="font1">Direct Seller Login</h3>
            </div>
            <div class="as-form">
                <input class="as-input" type="text" name="username" id="" placeholder="Username"><br>
                <input class="as-input" type="password" name="password" id="" placeholder="Password"><br>
                <button class="as-btn as-input">SIGN IN</button>
            </div>
            <div class="as-forgot-pass">
                <a class="font3" href="#">Forgot Password</a>
            </div>
        </div>
    </section>

    <footer class="footer center flex font2 background">
        <p>Copyright &copy; 2021 All rights reserved</p>
    </footer>

</body>
</html>
