<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/utils.css">
    <link rel="stylesheet" href="css/mobile.css">
    <link rel="stylesheet" href="css/contact.css">
    <title>Contact Us</title>
</head>
<body>
    <nav class="navbar background sticky bg-img">
        <div class="left-nav">
            <ul class="left-tab">
                <li class="list-item"><a href="index.html">Home</a></li>
                <li class="list-item"><a href="about.html">About</a></li>
                <li class="list-item"><a href="contact.html">Contact</a></li>
            </ul>
            <div class="logo">
                <img src="img/logo-dark.png" alt="Logo">
            </div>
        </div>
        <div class="right-nav">
            <ul class="right-tab">
                <li class="list-item"><a href="associate.html">Associate Login</a></li>
            </ul>
        </div>
    </nav>

    <div class="contact-container">
        <div class="contact-heading">
            <h2 class="contact-head font4">Contact Us</h2>
        </div>
        <div class="contact-box">
            <div class="contact-content">
                <h2 class="contact-content-h2 font2">
                   GET IN TOUCH
                </h2>
                <p class="contact-content-para1 font1">
                    Phone: 9809843098
                </p>
                <p class="contact-content-para2 font1">
                    Email: <span class="pink">avinashkhare305@gmail.com</span>
                </p>
                <p class="contact-content-para3 font1">
                    Address: Shri Guru Nanak Dev bhawan, Near Bharat Nagar Chowk, Ludhiana
                </p>
            </div>
            <div class="contact-form-body">
                <div class="contact-input">
                    <input type="text" class="contact-input-in font1" placeholder="Your Name*">
                    <input type="email" class="contact-input-in font1" name="" id="" placeholder="Your Email*">
                    <input type="number" class="contact-input-in font1" name="" id="" placeholder="Your Phone*">
                </div>
                <div class="contact-textarea">
                    <textarea name="" id="" cols="30" rows="10" class="contact-textarea-input font1" placeholder="Your Message*"></textarea>
                </div>
            </div>
            <div class="contact-button">
                <button class="contact-btn font1">
                    SEND MESSAGE
                </button>
            </div>
            
        </div>
    </div>

    <footer class="footer center flex font2 background">
        <p>Copyright &copy; 2021 All rights reserved</p>
    </footer>
</body>
</html>
